services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ecomatch
      POSTGRES_PASSWORD: ecomatch
      POSTGRES_DB: ecomatch
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ecomatch']
      interval: 10s
      timeout: 5s
      retries: 5

  ms1:
    build:
      context: ./ms1-core-api
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://ecomatch:ecomatch@postgres:5432/ecomatch
      JWT_SECRET: dev-secret-key-change-in-production
      MS2_BASE_URL: http://ms2:8000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ms1-core-api:/app
      - /app/node_modules
    command: npm run dev

  ms2:
    build:
      context: ./ms2-agent-service
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      PORT: 8000
      LOG_LEVEL: info
      LLM_MODEL: claude-3-haiku-20240307
      LLM_TEMPERATURE: 0.7
      SCOUT_CONFIDENCE_THRESHOLD: 0.7
      ALCHEMIST_CONFIDENCE_THRESHOLD: 0.7
      USE_LLM: "false"  # Default to false for local dev fallback to keep it robust and key-free
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - ./ms2-agent-service:/app
    command: python run.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      NODE_ENV: development
    depends_on:
      - ms1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
