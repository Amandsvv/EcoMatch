services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecomatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecomatch}
      POSTGRES_DB: ${POSTGRES_DB:-ecomatch}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecomatch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecomatch-dev-network

  ms1:
    build:
      context: ./ms1-core-api
      dockerfile: Dockerfile
    ports:
      - "${MS1_PORT:-4000}:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ecomatch}:${POSTGRES_PASSWORD:-ecomatch}@postgres:5432/${POSTGRES_DB:-ecomatch}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      MS2_BASE_URL: http://ms2:8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - ./ms1-core-api:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecomatch-dev-network

  ms2:
    build:
      context: ./ms2-agent-service
      dockerfile: Dockerfile
    ports:
      - "${MS2_PORT:-8000}:8000"
    environment:
      PORT: 8000
      LOG_LEVEL: debug
      USE_LLM: ${USE_LLM:-false}
    volumes:
      - ./ms2-agent-service/app:/app/app
    networks:
      - ecomatch-dev-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - ms1
    networks:
      - ecomatch-dev-network

networks:
  ecomatch-dev-network:
    driver: bridge

volumes:
  postgres_data:
