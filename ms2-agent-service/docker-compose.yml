version: "3.9"

services:
  ms2:
    build: .
    container_name: ms2-agent-service
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      LOG_LEVEL: info
      LLM_MODEL: claude-3-haiku-20240307
      LLM_TEMPERATURE: 0.7
      SCOUT_CONFIDENCE_THRESHOLD: 0.7
      ALCHEMIST_CONFIDENCE_THRESHOLD: 0.7
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - ./app:/app/app
