name: EcoMatch CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  #  Job 1: Test & Build ms1-core-api (Express API)
  # ─────────────────────────────────────────────────────────────────────────
  ms1-core:
    name: ms1-core-api Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './ms1-core-api/package-lock.json'

      - name: Install dependencies
        run: |
          cd ms1-core-api
          npm ci

      - name: Run Build
        run: |
          cd ms1-core-api
          npm run build

  # ─────────────────────────────────────────────────────────────────────────
  #  Job 2: Test & Verify ms2-agent-service (Python + LangGraph)
  # ─────────────────────────────────────────────────────────────────────────
  ms2-agents:
    name: ms2-agent-service Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: './ms2-agent-service/requirements.txt'

      - name: Install dependencies
        run: |
          cd ms2-agent-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest Test Suite
        run: |
          cd ms2-agent-service
          python -m pytest tests/ -v

  # ─────────────────────────────────────────────────────────────────────────
  #  Job 3: Test & Build Next.js Frontend
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    name: Next.js Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Verify Types (Tsc)
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Run Build
        run: |
          cd frontend
          npm run build
