services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecomatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecomatch}
      POSTGRES_DB: ${POSTGRES_DB:-ecomatch}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecomatch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecomatch-network

  db-migrate:
    build:
      context: ./ms1-core-api
      dockerfile: Dockerfile
    command: npm run db:migrate
    env_file:
      - ./ms1-core-api/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ecomatch}:${POSTGRES_PASSWORD:-ecomatch}@postgres:5432/${POSTGRES_DB:-ecomatch}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecomatch-network

  ms1:
    build:
      context: ./ms1-core-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${MS1_PORT:-4000}:4000"
    env_file:
      - ./ms1-core-api/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ecomatch}:${POSTGRES_PASSWORD:-ecomatch}@postgres:5432/${POSTGRES_DB:-ecomatch}
      MS2_BASE_URL: http://ms2:8000
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - ecomatch-network

  ms2:
    build:
      context: ./ms2-agent-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${MS2_PORT:-8000}:8000"
    env_file:
      - ./ms2-agent-service/.env
    environment:
      PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - ecomatch-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.ecomatch.store}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.ecomatch.store}
    command: npm run start
    depends_on:
      ms1:
        condition: service_healthy
    networks:
      - ecomatch-network

networks:
  ecomatch-network:
    driver: bridge

volumes:
  postgres_data:
